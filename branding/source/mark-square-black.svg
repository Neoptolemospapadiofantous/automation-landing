<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flowstack mark">
  <title>Flowstack — square mark, black on transparent</title>
  <!-- node frame -->
  <rect x="56" y="128" width="400" height="256" stroke="#000000" stroke-width="20" fill="none"/>
  <!-- active core (filled) -->
  <rect x="112" y="216" width="80" height="80" fill="#000000"/>
  <!-- queued indicator (hollow) -->
  <rect x="320" y="216" width="80" height="80" stroke="#000000" stroke-width="16" fill="none"/>
</svg>
