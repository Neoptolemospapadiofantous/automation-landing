<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flowstack mark, maskable">
  <title>Flowstack — maskable PWA icon, mark within ~60% safe area</title>
  <!-- full-bleed black so Android masks (circle / squircle / square) all look intentional -->
  <rect width="512" height="512" fill="#000000"/>
  <!-- mark scaled into the inner ~60% safe area so any platform crop preserves it -->
  <g transform="translate(102 157) scale(0.768)">
    <rect x="0" y="0" width="400" height="256" stroke="#FFFFFF" stroke-width="20" fill="none"/>
    <rect x="56" y="88" width="80" height="80" fill="#FFFFFF"/>
    <rect x="264" y="88" width="80" height="80" stroke="#FFFFFF" stroke-width="16" fill="none"/>
  </g>
</svg>
