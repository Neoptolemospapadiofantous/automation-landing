<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flowstack mark">
  <title>Flowstack — square mark, white on transparent</title>
  <!-- input wire -->
  <path d="M30 256 H110" stroke="#FFFFFF" stroke-width="18"/>
  <!-- node frame -->
  <rect x="120" y="180" width="272" height="152" stroke="#FFFFFF" stroke-width="18" fill="none"/>
  <!-- active core (filled) -->
  <rect x="167" y="232" width="48" height="48" fill="#FFFFFF"/>
  <!-- queued indicator (hollow) -->
  <rect x="297" y="232" width="48" height="48" stroke="#FFFFFF" stroke-width="14" fill="none"/>
  <!-- output wire -->
  <path d="M402 256 H468" stroke="#FFFFFF" stroke-width="18"/>
  <!-- arrowhead -->
  <path d="M448 218 L482 256 L448 294" stroke="#FFFFFF" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
</svg>
