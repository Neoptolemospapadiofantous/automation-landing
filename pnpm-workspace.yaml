# pnpm 10 refuses to silently run package postinstall scripts (defence
# against supply-chain payloads). The packages listed below are
# explicitly allowed; everything else is silently skipped.
#
#   - sharp         compiles native libvips bindings used by Next image
#                   optimisation. Without it, image transforms break at
#                   runtime.
#   - unrs-resolver downloads the platform-specific binary for the
#                   Rust-backed module resolver used by oxlint / eslint
#                   plugins.
#
#   - msw           transitive dependency of `shadcn` (the CLI we use to
#                   install components). Its postinstall copies a single
#                   ~5KB mockServiceWorker.js into public/. We don't use
#                   msw for runtime mocking; allowing the build keeps
#                   pnpm's strict-build-scripts policy happy on the
#                   Forge box without harming production.
#
# This MUST be `onlyBuiltDependencies` (allow-list), NOT
# `ignoredBuiltDependencies` (deny-list) — the latter would block these
# packages from running their postinstall and break Next image at
# runtime.
onlyBuiltDependencies:
  - msw
  - sharp
  - unrs-resolver
